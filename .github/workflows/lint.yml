name: Lint

# PR gate for formatting and linting. Unlike pre-commit.ci, this only CHECKS —
# it never pushes auto-fix commits to your branch. Local fixes are handled by
# husky + lint-staged on commit; run `npm run format` / `npm run lint:fix` to
# fix anything this flags.

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prettier format check
        run: npm run format:check

      - name: Lint (eslint + markdownlint)
        run: npm run lint

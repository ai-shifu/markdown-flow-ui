version: 2
updates:
  # npm dependencies. Minor/patch updates are grouped into a single PR to keep
  # the noise down; major updates come as individual PRs so they can be reviewed.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions versions, all grouped into one weekly PR.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
